name: macOS CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.0.app || sudo xcode-select -p

      - name: Resolve SPM
        run: xcodebuild -resolvePackageDependencies -project HopList.xcodeproj -scheme HopList -quiet

      - name: Build macOS
        run: xcodebuild -project HopList.xcodeproj -scheme HopList -destination 'platform=macOS' build -quiet

      - name: Test macOS
        run: xcodebuild -project HopList.xcodeproj -scheme HopList -destination 'platform=macOS' test -quiet

  lint:
    runs-on: macos-14
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.0.app || sudo xcode-select -p

      - name: SwiftLint (if available)
        run: |
          if command -v swiftlint &> /dev/null; then
            swiftlint lint --reporter github-actions-logging
          else
            echo "SwiftLint not installed, skipping linting"
          fi
